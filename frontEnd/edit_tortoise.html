<!DOCTYPE html>
<html>
<head>
    <title>Edit Tortoise</title>
    <style>/* same as above */</style>
    <script>
        async function loadTortoise() {
            const id = new URLSearchParams(window.location.search).get('id');
            if(!id) return;
            const res = await fetch(`../process/get_tortoise.php?id=${id}`);
            const data = await res.json();
            if(data) {
                document.querySelector('[name="tortoise_id"]').value = data.tortoise_id;
                document.querySelector('[name="microchip_id"]').value = data.microchip_id;
                document.querySelector('[name="name"]').value = data.name;
                document.querySelector('[name="species_id"]').value = data.species_id;
                document.querySelector('[name="sex"]').value = data.sex;
                document.querySelector('[name="estimated_age_years"]').value = data.estimated_age_years;
                document.querySelector('[name="weight_grams"]').value = data.weight_grams;
                document.querySelector('[name="health_status"]').value = data.health_status;
                document.querySelector('[name="enclosure_id"]').value = data.enclosure_id;
                document.querySelector('[name="acquisition_date"]').value = data.acquisition_date;
                document.querySelector('[name="acquisition_source"]').value = data.acquisition_source;
                document.querySelector('[name="notes"]').value = data.notes;
            }
        }
        window.onload = loadTortoise;
    </script>
</head>
<body>
<div class="form-card">
    <h2>✏️ Edit Tortoise</h2>
    <form action="../process/edit_tortoise.php" method="POST">
        <input type="hidden" name="tortoise_id">
        <label>Microchip ID</label><input type="text" name="microchip_id">
        <label>Name</label><input type="text" name="name">
        <label>Species ID</label><input type="number" name="species_id">
        <label>Sex</label><select name="sex">...</select>
        <label>Estimated Age</label><input type="number" name="estimated_age_years">
        <label>Weight (g)</label><input type="number" step="0.01" name="weight_grams">
        <label>Health Status</label><select name="health_status">...</select>
        <label>Enclosure ID</label><input type="number" name="enclosure_id">
        <label>Acquisition Date</label><input type="date" name="acquisition_date">
        <label>Acquisition Source</label><select name="acquisition_source">...</select>
        <label>Notes</label><textarea name="notes"></textarea>
        <button type="submit">Update Tortoise</button>
    </form>
</div>
</body>
</html>
