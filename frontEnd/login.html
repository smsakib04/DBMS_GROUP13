<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tortoise Themed Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap');
        body {
            background: linear-gradient(135deg, #a8e063 0%, #56ab2f 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
        }
        .login-container {
            background: #f4fbe2;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(34, 49, 63, 0.2);
            padding: 40px 32px 32px 32px;
            width: 350px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .tortoise-icon {
            width: 70px;
            margin-bottom: 18px;
        }
        .login-title {
            font-size: 2rem;
            color: #3e6b2f;
            margin-bottom: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .login-form {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .login-form input {
            padding: 12px 16px;
            border: none;
            border-radius: 10px;
            background: #e0f3c8;
            font-size: 1rem;
            color: #3e6b2f;
            outline: none;
            transition: box-shadow 0.2s;
            box-shadow: 0 2px 6px rgba(56, 142, 60, 0.07);
        }
        .login-form input:focus {
            box-shadow: 0 0 0 2px #a8e063;
        }
        .login-btn {
            background: linear-gradient(90deg, #56ab2f 0%, #a8e063 100%);
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 12px 0;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(56, 142, 60, 0.13);
            transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .login-btn:hover {
            background: linear-gradient(90deg, #a8e063 0%, #56ab2f 100%);
            transform: translateY(-2px) scale(1.03);
        }
    </style>
</head>
<body>
    <div class="login-container">
        <svg class="tortoise-icon" viewBox="0 0 64 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <ellipse cx="32" cy="28" rx="24" ry="16" fill="#56ab2f"/>
            <ellipse cx="32" cy="28" rx="20" ry="13" fill="#a8e063"/>
            <ellipse cx="32" cy="28" rx="16" ry="10" fill="#f4fbe2"/>
            <ellipse cx="12" cy="38" rx="4" ry="7" fill="#56ab2f"/>
            <ellipse cx="52" cy="38" rx="4" ry="7" fill="#56ab2f"/>
            <ellipse cx="32" cy="14" rx="8" ry="5" fill="#56ab2f"/>
            <ellipse cx="32" cy="13" rx="5" ry="3" fill="#a8e063"/>
            <ellipse cx="32" cy="12" rx="2" ry="1" fill="#3e6b2f"/>
        </svg>
        <div class="login-title">Login</div>
        <form class="login-form" autocomplete="off">
            <input type="text" placeholder="Enter your user ID" required>
            <input type="password" placeholder="Enter your password" required>
            <button class="login-btn" type="submit">Login</button>
        </form>
    </div>
</body>
</html>
