<!DOCTYPE html>
<html><head><title>Add Breeding Pair</title></head>
<body>
<div class="form-card">
    <h2>🐢 Create Breeding Pair</h2>
    <form action="../process/add_breeding_pair.php" method="POST">
        <label>Pair Code</label><input type="text" name="pair_code">
        <label>Male Tortoise ID</label><input type="number" name="male_tortoise_id" required>
        <label>Female Tortoise ID</label><input type="number" name="female_tortoise_id" required>
        <label>Pairing Date</label><input type="date" name="pairing_date" required>
        <label>Status</label>
        <select name="status">
            <option>paired</option><option>courting</option><option>incubating</option><option>hatched</option><option>separated</option>
        </select>
        <label>Notes</label><textarea name="notes" rows="2"></textarea>
        <button type="submit">Create Pair</button>
    </form>
</div>
</body>
</html>
