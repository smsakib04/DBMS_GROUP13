<!DOCTYPE html>
<html><head><title>Update Task Status</title></head>
<body>
<div class="form-card">
    <h2>🔄 Change Task Status</h2>
    <form action="../process/update_task_status.php" method="POST">
        <label>Task ID</label><input type="number" name="task_id" required>
        <label>New Status</label>
        <select name="status">
            <option>Pending</option><option>In Progress</option><option>Completed</option><option>Cancelled</option>
        </select>
        <label>Completion Notes (optional)</label><textarea name="completion_notes"></textarea>
        <button type="submit">Update</button>
    </form>
</div>
</body>
</html>
